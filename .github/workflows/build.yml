name: Manual Xcode Project Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Xcode Project
        run: |
          gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.new('Rumble.xcodeproj')
          target = project.new_target(:application, 'Rumble', :ios, '15.0')
          Dir.glob('*.{h,m}').each do |file_path|
            file_ref = project.main_group.new_file(file_path)
            target.add_file_references([file_ref])
          end
          project.save
          "

      - name: Build IPA
        run: |
          # Собираем проект, отключая все проверки и валидацию
          xcodebuild -project Rumble.xcodeproj \
          -scheme Rumble \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ENTITLEMENTS="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          COMPILER_INDEX_STORE_ENABLE=NO \
          VALIDATE_PRODUCT=NO \
          clean build
          
          # Создаем папку для упаковки
          mkdir -p Payload
          
          # Ищем скомпилированное приложение (оно может быть в разных папках)
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Rumble.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "Rumble.app" -type d | head -n 1)
          fi
          
          echo "Найдено приложение по пути: $APP_PATH"
          
          # Копируем и упаковываем
          cp -r "$APP_PATH" Payload/
          zip -r Rumble.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Rumble-Final-IPA
          path: Rumble.ipa
