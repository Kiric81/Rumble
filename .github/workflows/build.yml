name: Manual Xcode Project Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Info.plist and Xcode Project
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Rumble</string>
              <key>CFBundleIdentifier</key>
              <string>com.rumble.byedpi</string>
              <key>CFBundleName</key>
              <string>Rumble</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
          </dict>
          </plist>
          EOF

          gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.new('Rumble.xcodeproj')
          target = project.new_target(:application, 'Rumble', :ios, '15.0')
          target.build_configurations.each { |config| config.build_settings['INFOPLIST_FILE'] = 'Info.plist' }
          Dir.glob('*.{h,m}').each { |f| target.add_file_references([project.main_group.new_file(f)]) }
          project.save
          "

      - name: Build
        run: |
          xcodebuild -project Rumble.xcodeproj -scheme Rumble -sdk iphoneos -configuration Release \
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO AD_HOC_CODE_SIGNING_ALLOWED=YES \
          COMPILER_INDEX_STORE_ENABLE=NO VALIDATE_PRODUCT=NO clean build

      - name: Create IPA
        run: |
          mkdir -p Payload
          # Находим путь к приложению и копируем его
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Rumble.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r Rumble.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Rumble-Success-IPA
          path: Rumble.ipa
