name: Manual Xcode Project Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Xcode Project
        run: |
          gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.new('Rumble.xcodeproj')
          target = project.new_target(:application, 'Rumble', :ios, '15.0')
          
          # Правильное добавление файлов в проект
          Dir.glob('*.{h,m}').each do |file_path|
            file_ref = project.main_group.new_file(file_path)
            target.add_file_references([file_ref])
          end
          
          project.save
          "

      - name: Build IPA
        run: |
          # Собираем проект
          xcodebuild -project Rumble.xcodeproj -scheme Rumble -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
          
          # Упаковка в IPA
          mkdir -p Payload
          # Ищем скомпилированное приложение
          APP_PATH=$(find build/Release-iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Ошибка: Приложение не собралось. Проверь логи компиляции выше."
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r Rumble.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Rumble-Manual-IPA
          path: Rumble.ipa
