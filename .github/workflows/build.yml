name: Ultimate Rumble Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          # Устанавливаем путь к инструментам разработчика Apple
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          
          # Создаем структуру папок вручную, так как проекта нет
          mkdir -p build/Payload
          
      - name: Compile Source
        run: |
          # Пытаемся скомпилировать все .m файлы в один исполняемый файл
          # Это грубый метод, но для репозитория без xcodeproj он единственный
          clang -v -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 -miphoneos-version-min=14.0 \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -o build/Rumble *.m
          
      - name: Create App Bundle
        run: |
          # Создаем папку приложения
          mkdir -p build/Payload/Rumble.app
          
          # Копируем скомпилированный файл и ресурсы
          cp build/Rumble build/Payload/Rumble.app/
          [ -d Resources ] && cp -r Resources/* build/Payload/Rumble.app/ || echo "No resources found"
          
          # Создаем базовый Info.plist (без него iOS не поймет, что это за файл)
          cat <<EOF > build/Payload/Rumble.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Rumble</string>
              <key>CFBundleIdentifier</key>
              <string>com.rumble.byedpi</string>
              <key>CFBundleName</key>
              <string>Rumble</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Packaging IPA
        run: |
          cd build
          zip -r ../Rumble.ipa Payload
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Rumble-Manual-Build
          path: Rumble.ipa

